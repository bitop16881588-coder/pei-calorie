<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyCal - 每日饮食卡路里记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍎 DailyCal</h1>
            <p>记录每一餐，掌控你的健康</p>
        </header>

        <section class="date-container">
            <button id="btn-prev-day" class="btn-date-nav">◀</button>
            <input type="date" id="date-picker">
            <button id="btn-next-day" class="btn-date-nav">▶</button>
        </section>

        <section class="dashboard">
            <div class="progress-circle">
                <div class="inner">
                    <span id="total-calories">0</span>
                    <small>今日摄入 (kcal)</small>
                </div>
            </div>
        </section>

        <section class="form-section">
            <h3>添加饮食</h3>
            <form id="food-form">
                <div class="form-group">
                    <input type="text" id="food-name" placeholder="食物名称 (如: 煎鸡蛋)" required>
                </div>
                <div class="form-group">
                    <input type="number" id="food-calories" placeholder="卡路里 (kcal)" required min="1">
                </div>
                <button type="submit" class="btn-submit">添加记录</button>
            </form>
        </section>

        <section class="list-section">
            <h3>当日餐单</h3>
            <ul id="food-list" class="food-list">
                </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
