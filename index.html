<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyCal - 每日飲食卡路里記錄</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="cute-quote-box">
        “ 健康不是懲罰，而是對身體的投資。 ”
    </div>

    <div class="dashboard-wrapper">
        
        <aside class="side-panel left-panel">
            <div class="panel-card">
                <h3><i class="fa-solid fa-chart-pie chart-icon"></i> 攝入統計看板</h3>
                <div class="stat-item">
                    <span class="stat-title">本週平均攝入</span>
                    <span id="avg-calories" class="stat-value">0 <small>kcal</small></span>
                </div>
                <div class="stat-item">
                    <span class="stat-title">已記錄天數</span>
                    <span id="recorded-days" class="stat-value">0 <small>天</small></span>
                </div>
                <div class="stat-item">
                    <span class="stat-title">最高攝入的一天</span>
                    <span id="max-calories" class="stat-value">0 <small>kcal</small></span>
                </div>
            </div>
            
            <div class="panel-card chart-panel">
                <h3><i class="fa-solid fa-chart-line chart-icon"></i> 本週卡路里趨勢</h3>
                <canvas id="calorieLineChart"></canvas>
            </div>
        </aside>

        <main class="main-panel">
            <div class="container main-app-card">
                <header>
                    <div class="header-content">
                        <img src="https://cdn-icons-png.flaticon.com/512/415/415733.png" alt="apple" class="main-mascot">
                        <h1>DailyCal 健康看盤</h1>
                    </div>
                    <p>記錄每一餐，掌控你的健康</p>
                </header>

                <section class="calendar-pagination">
                    <button id="btn-prev-week" class="pag-arrow">&lt;</button>
                    <div id="calendar-days" class="days-container">
                        </div>
                    <button id="btn-next-week" class="pag-arrow">&gt;</button>
                </section>

                <section class="dashboard">
                    <div class="progress-circle">
                        <div class="inner">
                            <span id="total-calories">0</span>
                            <small>今日總攝入 / 2000 kcal</small>
                        </div>
                    </div>
                </section>

                <section class="quick-add-section">
                    <h3><i class="fa-solid fa-cookie-bite title-icon"></i> 常用食物快捷添加</h3>
                    <div class="category-tabs">
                        <button class="tab-btn active" data-cat="staple">主食</button>
                        <button class="tab-btn" data-cat="protein">肉蛋奶</button>
                        <button class="tab-btn" data-cat="veg">蔬菜</button>
                        <button class="tab-btn" data-cat="snack">水果零食</button>
                    </div>
                    <div id="quick-food-pool" class="food-pool">
                        </div>
                </section>

                <section class="form-section">
                    <h3><i class="fa-solid fa-pencil title-icon"></i> 手動添加飲食</h3>
                    <form id="food-form">
                        <div class="form-group">
                            <input type="text" id="food-name" placeholder="食物名稱 (如: 煎雞腿)" required>
                        </div>
                        <div class="form-group">
                            <input type="number" id="food-calories" placeholder="卡路里 (kcal)" required min="1">
                        </div>
                        <button type="submit" class="btn-submit">添加記錄</button>
                    </form>
                </section>

                <section class="list-section">
                    <h3><i class="fa-solid fa-list-check title-icon"></i> 當日餐單</h3>
                    <ul id="food-list" class="food-list">
                        </ul>
                </section>
            </div>
        </main>

        <aside class="side-panel right-panel">
            <div class="panel-card water-card">
                <h3><i class="fa-solid fa-droplet water-icon"></i> 今日飲水追蹤</h3>
                <p class="water-sub">目標: 2000 ml (8杯水)</p>
                <div class="water-grid" id="water-cup-grid">
                    </div>
                <div class="water-status">
                    今日已喝: <span id="water-count">0</span> / 2000 ml
                </div>
            </div>

            <div class="panel-card tdee-card">
                <h3><i class="fa-solid fa-gears settings-icon"></i> 目標計算小工具</h3>
                <div class="tdee-row">
                    <input type="number" id="tdee-weight" placeholder="體重 (kg)">
                    <input type="number" id="tdee-height" placeholder="身高 (cm)">
                </div>
                <button id="btn-calc-tdee" class="btn-calc">粗估每日消耗</button>
                <div id="tdee-result" class="tdee-result-text">算出來後可同步連動圓環目標</div>
            </div>

            <div class="panel-card random-menu-card">
                <h3><i class="fa-solid fa-dice title-icon"></i> 今日健康餐推薦</h3>
                <p class="water-sub">不知道吃什麼？讓 DailyCal 幫你配！</p>
                <button id="btn-random-food" class="btn-calc" style="background-color: #ff9f1c;">🍳 抽取幸運健康餐</button>
                <div id="random-food-result" class="tdee-result-text"></div>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
