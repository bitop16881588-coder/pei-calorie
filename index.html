<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>DailyCal · 每日健康日誌</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quote">健康不是懲罰,而是對身體的<b>投資</b>。</div>

    <div class="wrap">
        <div class="col" id="col-left">...</div> 

        <div class="col">
            <div class="card">
                <div class="tabs">
                    <button class="tab active" onclick="showTab('diet', this)">飲食記錄</button>
                    <button class="tab" onclick="showTab('fitness', this)">居家健身</button>
                    <button class="tab" onclick="showTab('green', this)">綠拿鐵</button>
                </div>
            </div>

            <div id="diet-tab" class="tab-content active">
                </div>

            <div id="fitness-tab" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>🏋️ 居家健身計畫</h3>
                    <p style="color:var(--muted); font-size:14px; margin-bottom:15px;">今日推薦：全身燃脂 20 分鐘</p>
                    <button class="btn" onclick="alert('計時開始！')">開始運動</button>
                </div>
            </div>

            <div id="green-tab" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>🥬 綠拿鐵計算器</h3>
                    <select id="veg-s" class="field"><option value="35">菠菜 (35kcal)</option><option value="40">地瓜葉 (40kcal)</option></select>
                    <select id="fruit-s" class="field"><option value="90">蘋果 (90kcal)</option><option value="100">香蕉 (100kcal)</option></select>
                    <select id="liq-s" class="field"><option value="130">無糖豆漿 (130kcal)</option><option value="180">鮮奶 (180kcal)</option></select>
                    <button class="btn accent" onclick="calcSmoothie()">計算總熱量</button>
                    <div id="smoothie-res" class="result"></div>
                </div>
            </div>
        </div>

        <div class="col">...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
