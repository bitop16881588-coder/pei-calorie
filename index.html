<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyCal · 每日健康日誌</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <div class="cute-quote-box">“ 健康不是懲罰，而是對身體的<b>投資</b>。 ”</div>
    <div class="dashboard-wrapper">
        <aside class="side-panel">
            <div class="panel-card" id="p-stats">
                <h3>📊 本週攝入統計</h3>
                <div class="stat-item"><span class="stat-title">平均攝入</span><span id="s-avg">0 kcal</span></div>
                <div class="stat-item"><span class="stat-title">記錄天數</span><span id="s-days">0 天</span></div>
                <div class="stat-item"><span class="stat-title">最高攝入</span><span id="s-max">0 kcal</span></div>
            </div>
            <div class="panel-card" id="p-chart"><h3>📈 本週趨勢</h3><div class="chart-box"><canvas id="chart"></canvas></div></div>
            <div class="panel-card" id="p-water"><h3>💧 飲水追蹤</h3><div class="water" id="water"></div><div class="water-status">已喝 <b id="water-ml">0</b> / 2000 ml</div></div>
            <div class="panel-card" id="p-tdee"><h3>🎯 目標工具</h3><div class="row2"><input type="number" id="t-weight" placeholder="kg"><input type="number" id="t-height" placeholder="cm"></div><button class="btn ghost" id="calc-tdee">粗估每日消耗</button><div class="result" id="tdee-result"></div></div>
            <div class="panel-card" id="p-lucky"><h3>🎲 健康餐推薦</h3><button class="btn accent" id="lucky-btn">🍳 抽一份幸運健康餐</button><div class="result" id="lucky-result"></div></div>
        </aside>
        <main class="main-panel">
            <div class="container">
                <header class="head"><h1>🍎 DailyCal</h1><div class="sel" id="sel-label">今天</div></header>
                <section class="cal-card"><div class="cal"><button class="arrow" id="prev-week">‹</button><div class="days" id="days"></div><button class="arrow" id="next-week">›</button></div></section>
                <nav class="app-nav"><button class="nav-btn active" onclick="switchMainTab('diet', this)">飲食日誌</button><button class="nav-btn" onclick="switchMainTab('fitness', this)">居家健身</button><button class="nav-btn" onclick="switchMainTab('green', this)">綠拿鐵</button></nav>
                <div id="diet-tab" class="tab-pane active"><div class="ring-card"><div class="ring"><svg viewBox="0 0 220 220" width="220" height="220"><circle class="track" cx="110" cy="110" r="92"></circle><circle class="bar" id="ring-bar" cx="110" cy="110" r="92"></circle></svg><div class="center"><span class="num" id="ring-num">0</span></div></div></div><div id="p-quick"><h3>🍪 常用食物</h3><div class="tabs" id="tabs"><button class="tab active" data-cat="staple">主食</button><button class="tab" data-cat="protein">肉蛋奶</button><button class="tab" data-cat="veg">蔬菜</button><button class="tab" data-cat="snack">水果</button></div><div class="pool" id="pool"></div></div><div id="p-manual"><h3>✏️ 手動添加</h3><div class="field"><input type="text" id="f-name" placeholder="食物名稱"><input type="number" id="f-cal" placeholder="kcal"></div><button class="btn" id="add-manual">添加記錄</button></div><ul class="list" id="list"></ul></div>
                <div id="fitness-tab" class="tab-pane"><div class="sub-feature-card"><h3>高效燃脂</h3><p>推薦：全身空腹燃脂運動。每天 20 分鐘。</p><button class="btn accent" onclick="toast('開始運動！')">開始運動</button></div></div>
                <div id="green-tab" class="tab-pane"><div class="sub-feature-card"><h3>綠拿鐵計算器</h3><select id="green-veg" class="fancy-select"><option value="35">菠菜</option></select><select id="green-fruit" class="fancy-select"><option value="90">蘋果</option></select><select id="green-liquid" class="fancy-select"><option value="130">豆漿</option></select><div class="blender-container"><div class="blender" id="my-blender"><div class="blender-lid"></div><div class="blender-cup"><div class="juice-fluid" id="juice-layer"></div><div class="blender-blade"></div></div><div class="blender-base"></div></div></div><button class="btn" onclick="calculateGreenSmoothie()">✨ 啟動瘋狂攪打！</button><div id="green-result" class="result"></div></div></div>
            </div>
        </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
